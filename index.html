<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="Utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bible verse fetcher</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        
        <div class="card-container">
            <h1>Bible Verse Fetcher</h1>
        <div>
            <p>Click the button below to fetch a random Bible verse:</p>
        
            <button type="button" id="generator">Generate a random verse</button>
        </div>
        </div>
        <div class="verse-overlay">
        <div class="verse-card">
            <p id="popup-verse"></p>
            <p id="verse-reference"></p>
        </div>
        </div>
    </body>
</html>
